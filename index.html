<!doctype html>
<html>
  <body>
    <audio id="player" controls autoplay>
      <source src="../audio/piano.mp3" type="audio/mpeg">
    </audio>

    <script>
      window.addEventListener('load', async () => {
        try {
          await document.getElementById('player').play();
        } catch (e) {
          console.log('Autoplay blocked:', e);
        }
      });
    </script>
  </body>
</html>
